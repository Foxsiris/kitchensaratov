# Развёртывание: PostgreSQL + API (Prisma) + nginx (статика + прокси /api)
#
# Первый запуск: скопируйте .env.example в .env, задайте JWT_SECRET и POSTGRES_PASSWORD.
# docker compose up -d --build
#
# Вход в админку: пароль из ADMIN_PASSWORD (по умолчанию changeme — смените в .env).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kitchensaratov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kitchensaratov}
      POSTGRES_DB: ${POSTGRES_DB:-kitchensaratov}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Просмотр БД с хоста: Prisma Studio, DBeaver, psql → localhost:${POSTGRES_PORT:-15432}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-15432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kitchensaratov -d kitchensaratov']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kitchensaratov}:${POSTGRES_PASSWORD:-kitchensaratov}@db:5432/${POSTGRES_DB:-kitchensaratov}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-use-openssl-rand-hex-32}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kitchensaratov.local}
      PORT: '4000'
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '4000'
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ''
        REACT_APP_SITE_URL: ${REACT_APP_SITE_URL:-}
    ports:
      - '${HTTP_PORT:-8080}:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:

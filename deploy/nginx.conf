# Лимит попыток входа (зона в контексте http — файл подключается из /etc/nginx/conf.d/)
limit_req_zone $binary_remote_addr zone=api_auth_login:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Безопасность (для HTTPS добавьте HSTS на том nginx, где терминируется TLS: Strict-Transport-Security)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Вход админа: узкий лимит (оставьте burst, чтобы легитимные клиенты не страдали)
    location /api/auth/ {
        limit_req zone=api_auth_login burst=5 nodelay;
        client_max_body_size 64k;
        proxy_pass http://api:4000/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        client_max_body_size 5m;
        proxy_pass http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
